name: Node CI

on:
  push:
    branches: 
      - src
    paths: 
      - 'docs/*'

jobs:
  build:

    runs-on: [ubuntu-18.04]

    strategy:
      matrix:
        node-version: [8.x, 10.x, 12.x]

    steps:
    - uses: actions/checkout@src
    - run: npm ci
    - run: npm run build
    - name: git sync
      run: 
        git branch master
        git checkout -b master
        git add docs/.vuepress/dist/*
        git commit "updated"
        git push -u origin master
